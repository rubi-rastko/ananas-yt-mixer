<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DESYNC MIXER</title>
<style>
body{
  background:#121212;
  color:white;
  font-family:sans-serif;
  padding:20px;
}

#inputs{
  margin-bottom:15px;
}

input{
  margin:4px;
}

#mixer{
  display:flex;
  gap:30px;
  align-items:flex-start;
  margin-bottom:40px;
}

.channel{
  background:#1e1e1e;
  padding:15px;
  border:2px solid #444;
  width:380px;
}

.player{
  margin-bottom:10px;
}

button{
  margin:3px;
}

.cueRow{
  display:flex;
  justify-content:space-between;
  margin-bottom:5px;
}

.sliderGroup{
  display:flex;
  flex-direction:row;
  justify-content:space-around;
  margin-top:10px;
}

.sliderBlock{
  display:flex;
  flex-direction:column;
  align-items:center;
  font-size:12px;
  margin:0 5px;
}

.sliderLabel{
  margin-bottom:3px;
}

.vslider{
  width:100px;
}

#saved{
  margin-top:25px;
}

.savedItem{
  background:#222;
  padding:5px;
  margin:4px 0;
  cursor:pointer;
}

.savedItem:hover{
  background:#333;
}
</style>
</head>

<body>
<h2>YouTube Cue Mixer 🎛️</h2>

<div id="inputs">
  <input id="url1" placeholder="Video 1 URL or ID">
  <input id="url2" placeholder="Video 2 URL or ID">
  <input id="url3" placeholder="Video 3 URL or ID">
  <br>
  <button onclick="loadVideos()">Load</button>
  <button onclick="startAll()">Start</button>
  <button onclick="pauseAll()">Pause</button>
  <button onclick="saveSet()">Save Set</button>
</div>

<div id="mixer"></div>

<h3>Saved Video Sets</h3>
<div id="saved"></div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
let players=[]
let delays=[]
let cueTimes=[]
const rateSteps = [0.5,0.75,1,1.25,1.5,1.75,2]

function getID(url){
  let m=url.match(/(?:v=|youtu.be\/)([^&]+)/)
  return m ? m[1] : url
}

function createChannel(i){
  let div=document.createElement("div")
  div.className="channel"
  cueTimes[i] = cueTimes[i] || [0,0,0,0]

  // cue buttons
  let cueRowRecall = '', cueRowSet = ''
  for(let c=0;c<4;c++){
    cueRowRecall += `<button onclick="recallCue(${i},${c})">Cue ${c+1}</button>`
    cueRowSet += `<button onclick="setCue(${i},${c})">Set ${c+1}</button>`
  }

  let sliderHTML = `
    <div class="sliderGroup">
      <div class="sliderBlock">
        <div class="sliderLabel" id="volLabel${i}">Volume: 80</div>
        <input type="range" min="0" max="100" step="1" value="80" class="vslider" id="vol${i}" oninput="updateVolume(${i},this.value)">
      </div>
      <div class="sliderBlock">
        <div class="sliderLabel" id="rateLabel${i}">Rate: 1</div>
        <input type="range" min="0" max="6" step="1" value="2" class="vslider" id="rate${i}" oninput="updateRate(${i},this.value)">
      </div>
      <div class="sliderBlock">
        <div class="sliderLabel" id="delayLabel${i}">Delay: 0s</div>
        <input type="range" min="0" max="10" step="0.1" value="0" class="vslider" id="delay${i}" oninput="updateDelay(${i},this.value)">
      </div>
    </div>
  `

  div.innerHTML=`
    <div id="player${i}" class="player"></div>
    <div>
      <div class="cueRow">${cueRowRecall}</div>
      <div class="cueRow">${cueRowSet}</div>
    </div>
    <div>
      <button onclick="playVideo(${i})">▶</button>
      <button onclick="pauseVideo(${i})">⏸</button>
      <button onclick="randomSeek(${i})">🎲 Chaos</button>
    </div>
    ${sliderHTML}
  `
  return div
}

function loadVideos(){
  players=[]
  delays=[]
  cueTimes=[]
  document.getElementById("mixer").innerHTML=""

  let urls=[document.getElementById("url1").value,
            document.getElementById("url2").value,
            document.getElementById("url3").value]

  urls.forEach((url,i)=>{
    if(!url) return
    let id=getID(url)
    let channel=createChannel(i)
    document.getElementById("mixer").appendChild(channel)
    players[i]=new YT.Player("player"+i,{
      height:"200",
      width:"320",
      videoId:id,
      playerVars:{playsinline:1,controls:1}
    })
    delays[i]=0
  })
}

// Slider update functions
function updateVolume(i,v){
  document.getElementById("volLabel"+i).innerText = "Volume: "+v
  if(players[i]) players[i].setVolume(v)
}

function updateRate(i,v){
  let rate = rateSteps[v]
  document.getElementById("rateLabel"+i).innerText = "Rate: "+rate
  if(players[i]) players[i].setPlaybackRate(rate)
}

function updateDelay(i,v){
  document.getElementById("delayLabel"+i).innerText = "Delay: "+v+"s"
  delays[i]=parseFloat(v)
}

// Playback
function playVideo(i){ setTimeout(()=>{if(players[i])players[i].playVideo()},(delays[i]||0)*1000) }
function pauseVideo(i){ if(players[i]) players[i].pauseVideo() }
function startAll(){ players.forEach((p,i)=>{if(p) playVideo(i)}) }
function pauseAll(){ players.forEach(p=>{if(p)p.pauseVideo()}) }

// Chaos random seek only
function randomSeek(i){
  let p=players[i]
  if(!p) return
  let dur=p.getDuration()
  if(!dur) return
  let t=Math.random()*dur
  p.seekTo(t,true)
}

// Cue functions
function setCue(channel,cueIndex){ if(!players[channel]) return; cueTimes[channel][cueIndex]=players[channel].getCurrentTime() }
function recallCue(channel,cueIndex){ if(!players[channel]) return; let t = cueTimes[channel][cueIndex] || 0; players[channel].seekTo(t,true) }

// Save/Load sets
function saveSet(){
  let urls=[url1.value,url2.value,url3.value]
  let saved=JSON.parse(localStorage.getItem("ytCueSets")||"[]")
  saved.push({urls:urls,cues:cueTimes})
  localStorage.setItem("ytCueSets",JSON.stringify(saved))
  renderSaved()
}

function renderSaved(){
  let saved=JSON.parse(localStorage.getItem("ytCueSets")||"[]")
  let div=document.getElementById("saved")
  div.innerHTML=""
  saved.forEach((s,idx)=>{
    let el=document.createElement("div")
    el.className="savedItem"
    el.innerText=s.urls.join(" | ")
    el.onclick=()=>{
      url1.value=s.urls[0]||""
      url2.value=s.urls[1]||""
      url3.value=s.urls[2]||""
      cueTimes = s.cues
      loadVideos()
    }
    div.appendChild(el)
  })
}

renderSaved()
</script>
</body>
</html>
